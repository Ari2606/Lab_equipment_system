<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Reservations</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body><div th:replace="~{fragments/nav :: nav}"></div><div class="container"><h2>Reservations</h2><a class="btn" th:href="@{/reservations/new}">Create Reservation</a><table><thead><tr><th>ID</th><th>Equipment</th><th>Student</th><th>Start</th><th>End</th><th>Status</th><th>Actions</th></tr></thead><tbody><tr th:each="r : ${reservations}"><td th:text="${r.id}"></td><td th:text="${r.equipment.name}"></td><td th:text="${r.student.username}"></td><td th:text="${r.startTime}"></td><td th:text="${r.endTime}"></td><td th:text="${r.status}"></td><td>
<form th:action="@{'/reservations/' + ${r.id} + '/approve'}" method="post" style="display:inline"><button type="submit">Approve</button></form>
<form th:action="@{'/reservations/' + ${r.id} + '/reject'}" method="post" style="display:inline"><button class="btn-danger" type="submit">Reject</button></form>
<form th:action="@{'/reservations/' + ${r.id} + '/issue'}" method="post" style="display:inline"><button class="btn-secondary" type="submit">Issue</button></form>
<form th:action="@{'/reservations/' + ${r.id} + '/return'}" method="post" style="display:inline"><button class="btn-secondary" type="submit">Return</button></form>
<form th:action="@{'/reservations/' + ${r.id} + '/cancel'}" method="post" style="display:inline"><button class="btn-danger" type="submit">Cancel</button></form>
</td></tr></tbody></table></div></body></html>
