<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>New Reservation</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body><div th:replace="~{fragments/nav :: nav}"></div><div class="container"><h2>New Reservation</h2><p class="error" th:text="${error}"></p><form th:action="@{/reservations}" th:object="${reservationForm}" method="post"><div><label>Equipment</label><select th:field="*{equipmentId}"><option th:each="e:${equipmentList}" th:value="${e.id}" th:text="${e.name + ' (' + e.equipmentCode + ')'}"></option></select></div><div><label>Start Time</label><input type="datetime-local" th:field="*{startTime}"></div><div><label>End Time</label><input type="datetime-local" th:field="*{endTime}"></div><div><label>Purpose</label><input th:field="*{purpose}"></div><button type="submit">Reserve</button></form></div></body></html>
