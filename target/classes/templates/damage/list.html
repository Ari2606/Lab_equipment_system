<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Damage Reports</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body><div th:replace="~{fragments/nav :: nav}"></div><div class="container"><h2>Damage Reports</h2><a class="btn" th:href="@{/damage/new}">Report Damage</a><table><thead><tr><th>ID</th><th>Equipment</th><th>Reported By</th><th>Description</th><th>Verified</th><th>Misuse</th><th>Action</th></tr></thead><tbody><tr th:each="d : ${damageReports}"><td th:text="${d.id}"></td><td th:text="${d.equipment.name}"></td><td th:text="${d.reportedBy.username}"></td><td th:text="${d.description}"></td><td th:text="${d.verified}"></td><td th:text="${d.misuseConfirmed}"></td><td><form th:action="@{'/damage/' + ${d.id} + '/verify'}" method="post" style="display:inline"><label><input type="checkbox" name="misuse">Misuse</label><button type="submit">Verify</button></form></td></tr></tbody></table></div></body></html>
