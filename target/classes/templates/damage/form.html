<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Report Damage</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body><div th:replace="~{fragments/nav :: nav}"></div><div class="container"><h2>Damage Report</h2><form th:action="@{/damage}" th:object="${damageReportForm}" method="post"><div><label>Equipment</label><select th:field="*{equipmentId}"><option th:each="e:${equipmentList}" th:value="${e.id}" th:text="${e.name}"></option></select></div><div><label>Reservation (optional)</label><select th:field="*{reservationId}"><option value="">-- none --</option><option th:each="r:${reservations}" th:value="${r.id}" th:text="${'Reservation #' + r.id}"></option></select></div><div><label>Description</label><textarea th:field="*{description}"></textarea></div><button type="submit">Submit</button></form></div></body></html>
