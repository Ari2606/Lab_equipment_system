<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Users</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body><div th:replace="~{fragments/nav :: nav}"></div><div class="container"><h2>User Management</h2><table><thead><tr><th>Name</th><th>Username</th><th>Email</th><th>Role</th><th>Status</th><th>Update</th></tr></thead><tbody><tr th:each="u:${users}"><td th:text="${u.fullName}"></td><td th:text="${u.username}"></td><td th:text="${u.email}"></td><td th:text="${u.role.name}"></td><td th:text="${u.status}"></td><td><form th:action="@{/admin/users/update}" method="post"><input type="hidden" name="userId" th:value="${u.id}"><select name="roleType"><option th:each="r:${roles}" th:value="${r}" th:text="${r}"></option></select><select name="status"><option th:each="s:${statuses}" th:value="${s}" th:text="${s}"></option></select><button type="submit">Save</button></form></td></tr></tbody></table></div></body></html>
