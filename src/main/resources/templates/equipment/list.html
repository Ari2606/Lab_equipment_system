<!-- Thymeleaf template to display and manage equipment list -->
<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Equipment</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body><div th:replace="~{fragments/nav :: nav}"></div><div class="container"><h2>Equipment</h2><a class="btn" th:href="@{/equipment/new}">Add Equipment</a><table><thead><tr><th>Code</th><th>Name</th><th>Category</th><th>Lab</th><th>Availability</th><th>Condition</th><th>Actions</th></tr></thead><tbody><tr th:each="item : ${equipmentList}"><td th:text="${item.equipmentCode}"></td><td th:text="${item.name}"></td><td th:text="${item.category.name}"></td><td th:text="${item.lab.name}"></td><td th:text="${item.availabilityStatus}"></td><td th:text="${item.conditionStatus}"></td><td><a class="btn-secondary btn" th:href="@{'/equipment/' + ${item.id} + '/edit'}">Edit</a><form th:action="@{'/equipment/' + ${item.id} + '/delete'}" method="post" style="display:inline"><button class="btn-danger" type="submit">Delete</button></form></td></tr></tbody></table></div></body></html>
