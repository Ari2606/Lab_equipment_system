<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Equipment Form</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body><div th:replace="~{fragments/nav :: nav}"></div><div class="container"><h2>Equipment Form</h2><form th:action="${equipmentId} != null ? @{'/equipment/' + ${equipmentId}} : @{/equipment}" th:object="${equipmentForm}" method="post"><div class="grid"><div><label>Code</label><input th:field="*{equipmentCode}"></div><div><label>Name</label><input th:field="*{name}"></div><div><label>Category</label><select th:field="*{categoryId}"><option th:each="c:${categories}" th:value="${c.id}" th:text="${c.name}"></option></select></div><div><label>Lab</label><select th:field="*{labId}"><option th:each="l:${labs}" th:value="${l.id}" th:text="${l.name}"></option></select></div><div><label>Availability</label><select th:field="*{availabilityStatus}"><option th:each="s:${availabilityStatuses}" th:value="${s}" th:text="${s}"></option></select></div><div><label>Condition</label><select th:field="*{conditionStatus}"><option th:each="s:${conditionStatuses}" th:value="${s}" th:text="${s}"></option></select></div></div><div><label>Notes</label><textarea th:field="*{notes}"></textarea></div><button type="submit">Save</button></form></div></body></html>
