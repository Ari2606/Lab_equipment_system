<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Reports</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body><div th:replace="~{fragments/nav :: nav}"></div><div class="container"><h2>Reports & Audit</h2><div class="grid"><div class="card">Total Users: <b th:text="${#lists.size(users)}"></b></div><div class="card">Total Fines: <b th:text="${#lists.size(fines)}"></b></div><div class="card">Audit Entries: <b th:text="${#lists.size(logs)}"></b></div></div><h3>Audit Logs</h3><table><thead><tr><th>User</th><th>Action</th><th>Details</th><th>Time</th></tr></thead><tbody><tr th:each="l:${logs}"><td th:text="${l.user != null ? l.user.username : 'system'}"></td><td th:text="${l.action}"></td><td th:text="${l.details}"></td><td th:text="${l.createdAt}"></td></tr></tbody></table></div></body></html>
