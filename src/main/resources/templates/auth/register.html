<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Register</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body><div class="container"><h2>Student Registration</h2><p class="error" th:text="${error}"></p>
<form th:action="@{/register}" th:object="${registerRequest}" method="post">
<div><label>Full Name</label><input th:field="*{fullName}"></div>
<div><label>Email</label><input th:field="*{email}"></div>
<div><label>Username</label><input th:field="*{username}"></div>
<div><label>Password</label><input type="password" th:field="*{password}"></div>
<button type="submit">Register</button></form></div></body></html>
