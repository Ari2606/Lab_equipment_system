<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Fines</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body><div th:replace="~{fragments/nav :: nav}"></div><div class="container"><h2>Fines</h2><table><thead><tr><th>ID</th><th>Student</th><th>Amount</th><th>Reason</th><th>Status</th><th>Action</th></tr></thead><tbody><tr th:each="f:${fines}"><td th:text="${f.id}"></td><td th:text="${f.student.username}"></td><td th:text="${f.amount}"></td><td th:text="${f.reason}"></td><td th:text="${f.status}"></td><td><form th:action="@{'/admin/fines/' + ${f.id} + '/paid'}" method="post"><button type="submit">Mark Paid</button></form></td></tr></tbody></table></div></body></html>
